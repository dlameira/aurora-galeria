<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora · Planejamento</title>
  <style>
    :root {
      --bg:#000; --panel:#0e0e0e; --field:#161616; --text:#f2f2f2; --muted:#888;
      --line:#262626; --accent:#e0653a; --ok:#5fb87a; --warn:#d99a3a; --err:#e0563a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit}

    .top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:16px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .top h1{font-size:15px;font-weight:600;letter-spacing:.02em}
    .top h1 span{color:var(--muted);font-weight:400}
    .top .sp{flex:1}
    .btn{font:inherit;font-size:12.5px;font-weight:500;padding:8px 14px;border-radius:7px;cursor:pointer;border:1px solid var(--line);background:var(--field);color:var(--text);transition:border-color .15s,background .15s}
    .btn:hover{border-color:#444}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn.primary:hover{filter:brightness(1.08)}
    .btn.link{background:transparent;border:none;color:var(--muted);padding:8px 6px}
    .btn.link:hover{color:var(--text)}

    .status{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
    .status.ok .dot{background:var(--ok)} .status.save .dot{background:var(--warn);animation:pulse 1s infinite} .status.err .dot{background:var(--err)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .wrap{max-width:980px;margin:0 auto;padding:22px}
    .empty{text-align:center;color:var(--muted);padding:80px 20px;font-size:14px;line-height:1.7}

    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 0 0 0 var(--accent);transition:box-shadow .4s}
    .card.flash{box-shadow:0 0 0 2px var(--accent)}
    .card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .card-num{font-size:12px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
    .card-num.rascunho{color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0;font-weight:400}
    .past-sep{margin:28px 4px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .past-sep::before,.past-sep::after{content:'';flex:1;height:1px;background:var(--line)}
    .past-sep span{color:var(--muted);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
    .past-sep:hover span{color:var(--text)}
    .card-head .sp{flex:1}
    .date-field{background:var(--field);border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;font-size:12.5px;padding:6px 10px;color-scheme:dark}
    .del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:5px}
    .del:hover{color:#e05a40;background:#1a1212}

    .blocks{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:720px){.blocks{grid-template-columns:1fr}}
    .block{background:var(--field);border:1px solid var(--line);border-radius:9px;padding:14px}
    .block-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .field{margin-bottom:10px}.field:last-child{margin-bottom:0}
    .field label{display:block;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .field input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;font-size:13px;padding:8px 10px;outline:none}
    .field input:focus{border-color:#444}
    .row2{display:flex;gap:10px}.row2 .field{flex:1}

    /* upload */
    .up-area{border:1px dashed var(--line);border-radius:7px;padding:22px 12px;text-align:center;cursor:pointer;color:var(--muted);font-size:12.5px;background:var(--bg);transition:border-color .15s,color .15s}
    .up-area:hover{border-color:#555;color:var(--text)}
    .up-preview{position:relative;border-radius:7px;overflow:hidden;background:#000}
    .up-preview img{width:100%;max-height:200px;object-fit:cover;display:block}
    .up-actions{position:absolute;left:6px;right:6px;bottom:6px;display:flex;gap:6px;justify-content:flex-end}
    .mini{font:inherit;font-size:10.5px;font-weight:500;padding:4px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.66);color:#fff;cursor:pointer;backdrop-filter:blur(2px)}
    .mini:hover{background:rgba(0,0,0,.85)}
    .up-loading{font-size:11px;color:var(--warn);margin-top:6px;text-align:center}

    .foot{text-align:center;padding:10px 0 60px}
    .hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6}
    /* botão Salvar embaixo do card sendo editado */
    .salvar-wrap{display:flex;justify-content:center;margin:2px 0 26px}
    #btnSalvar{padding:11px 30px;font-size:14px}
    /* animação do botão Salvar */
    #btnSalvar{transition:transform .12s ease,filter .12s,box-shadow .18s,background .25s,border-color .25s}
    #btnSalvar:hover{transform:translateY(-2px);filter:brightness(1.08);box-shadow:0 8px 20px rgba(224,101,58,.35)}
    #btnSalvar:active{transform:translateY(0) scale(.95)}
    #btnSalvar.saving{animation:pulseSave .8s ease-in-out infinite}
    #btnSalvar.saved{background:var(--ok);border-color:var(--ok);animation:popSave .42s ease}
    @keyframes pulseSave{0%,100%{opacity:1}50%{opacity:.55}}
    @keyframes popSave{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
    input[type=file]{display:none}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .overlay.hidden{display:none}
    .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:460px;width:100%}
    .modal h2{font-size:17px;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
    .modal ol{font-size:12.5px;color:var(--muted);line-height:1.7;margin:0 0 16px 18px}
    .modal ol b{color:var(--text)}
    .modal input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:8px;color:var(--text);font:inherit;font-size:13px;padding:11px 12px;outline:none;margin-bottom:12px}
    .modal input:focus{border-color:#555}
    .modal .err{color:var(--err);font-size:12px;margin-bottom:10px;display:none}
    .modal a{color:var(--accent)}
  </style>
</head>
<body>
  <div class="top">
    <h1>Aurora <span>· Planejamento</span></h1>
    <a class="btn link" id="navCal" href="calendario.html" title="Visão dos redatores">↗ calendário</a>
    <div class="sp"></div>
    <span class="status" id="status"><span class="dot"></span><span id="statusTxt">—</span></span>
    <button class="btn link" id="btnLink" title="Copiar um link que conecta sozinho — salve nos favoritos">🔗 link de acesso</button>
    <button class="btn link" id="btnToken">sair</button>
    <button class="btn primary" id="btnNova">+ Nova edição</button>
  </div>

  <div class="wrap">
    <div id="lista"></div>
    <div class="foot">
      <div class="hint">Salva automaticamente no GitHub — sincroniza entre PCs. As imagens ficam em <b>qualidade original</b>.</div>
    </div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2>Conectar ao planejamento</h2>
      <p>Cole seu <b>token do GitHub</b> para carregar e salvar (sincroniza entre PCs).</p>
      <div class="err" id="tokErr"></div>
      <input type="text" id="tokInput" placeholder="github_pat_..." autocomplete="off" spellcheck="false" style="-webkit-text-security:disc">
      <button class="btn primary" id="tokSave" style="width:100%">Conectar</button>
    </div>
  </div>

  <script>
    const OWNER='dlameira', REPO='aurora-planejamento', FILE='planejamento.json', BRANCH='main'
    const TOKEN_KEY='aurora_plan_token'
    const CONTENTS=`https://api.github.com/repos/${OWNER}/${REPO}/contents/`
    const BLOBS=`https://api.github.com/repos/${OWNER}/${REPO}/git/blobs/`

    let TOKEN='', EDICOES=[], SHA=null, dirty=false, saving=false, saveTimer=null
    let alvo='', alvoFeito=false
    const blobCache={}
    // Persistência do token: localStorage + cookie (cookie costuma sobreviver onde o localStorage é limpo)
    const ckSet=v=>{try{document.cookie=TOKEN_KEY+'='+encodeURIComponent(v)+';max-age=31536000;path=/;samesite=lax'+(location.protocol==='https:'?';secure':'')}catch{}}
    const ckGet=()=>{const m=document.cookie.match('(?:^|; )'+TOKEN_KEY+'=([^;]*)');return m?decodeURIComponent(m[1]):''}
    const lsGet=()=>{try{return localStorage.getItem(TOKEN_KEY)||''}catch{return ''}}
    function salvarToken(v){try{localStorage.setItem(TOKEN_KEY,v)}catch{};ckSet(v)}
    function limparToken(){try{localStorage.removeItem(TOKEN_KEY)}catch{};try{document.cookie=TOKEN_KEY+'=;max-age=0;path=/'}catch{}}
    // Token pode vir no link (#tk=...) — pra favorito que conecta sozinho; senão, do navegador
    ;(function(){
      const hp={};(location.hash||'').replace(/^#/,'').split('&').forEach(p=>{const i=p.indexOf('=');if(i>0)hp[p.slice(0,i)]=decodeURIComponent(p.slice(i+1));else if(p)hp.ed=p})
      if(hp.tk){TOKEN=hp.tk;salvarToken(TOKEN)}
      alvo=hp.ed||''
      if(!TOKEN)TOKEN=lsGet()||ckGet()
      if(location.hash)history.replaceState(null,'',location.pathname)
    })()
    // links internos carregam o token (caso o navegador não guarde nada)
    function atualizarNav(){const c=document.getElementById('navCal');if(c)c.href='calendario.html'+(TOKEN?('#tk='+encodeURIComponent(TOKEN)):'')}

    const b64e=s=>btoa(unescape(encodeURIComponent(s)))
    const b64d=b=>decodeURIComponent(escape(atob((b||'').replace(/\s/g,''))))
    const esc=s=>(s||'').replace(/"/g,'&quot;')
    const uid=()=>'e'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36)
    const headers=()=>({Authorization:'Bearer '+TOKEN,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'})
    const fileToB64=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})

    function setStatus(cls,txt){document.getElementById('status').className='status '+cls;document.getElementById('statusTxt').textContent=txt}

    // ── JSON (planejamento) ──
    async function ghGetJson(){
      const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH+'&t='+Date.now(),{headers:headers(),cache:'no-store'})
      if(res.status===401)throw 'auth'
      if(res.status===403)throw 'forbidden'
      if(res.status===404)return{data:[],sha:null}
      if(!res.ok)throw 'http '+res.status
      const j=await res.json();let data=[]
      try{data=JSON.parse(b64d(j.content))}catch{data=[]}
      return{data:Array.isArray(data)?data:[],sha:j.sha}
    }
    async function ghPutJson(arr,sha){
      const body={message:'atualiza planejamento',content:b64e(JSON.stringify(arr,null,2)),branch:BRANCH}
      if(sha)body.sha=sha
      const res=await fetch(CONTENTS+FILE,{method:'PUT',headers:headers(),body:JSON.stringify(body)})
      if(res.status===401)throw 'auth'
      if(res.status===409||res.status===422)throw 'conflict'
      if(!res.ok)throw 'http '+res.status
      return (await res.json()).content.sha
    }

    // ── Arquivos (imagens) ──
    async function ghPutFile(path,b64){
      let sha=null
      try{const g=await fetch(CONTENTS+path+'?ref='+BRANCH,{headers:headers()});if(g.ok)sha=(await g.json()).sha}catch{}
      const body={message:'imagem',content:b64,branch:BRANCH};if(sha)body.sha=sha
      const r=await fetch(CONTENTS+path,{method:'PUT',headers:headers(),body:JSON.stringify(body)})
      if(!r.ok)throw 'put '+r.status
      return (await r.json()).content.sha
    }
    async function ghGetBlobB64(sha){
      const r=await fetch(BLOBS+sha,{headers:headers()})
      if(!r.ok)throw 'blob '+r.status
      return ((await r.json()).content||'').replace(/\s/g,'')
    }
    function makeThumb(file,maxDim=1000,q=0.85){
      return new Promise((res,rej)=>{const img=new Image()
        img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight
          if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
          const c=document.createElement('canvas');c.width=w;c.height=h
          const x=c.getContext('2d');x.fillStyle='#111';x.fillRect(0,0,w,h);x.drawImage(img,0,0,w,h)
          res(c.toDataURL('image/jpeg',q).split(',')[1]);URL.revokeObjectURL(img.src)}
        img.onerror=rej;img.src=URL.createObjectURL(file)})
    }

    // ── Carregar / salvar JSON ──
    async function carregar(){
      if(!TOKEN){abrirOverlay();return}
      setStatus('save','carregando…')
      try{
        const {data,sha}=await ghGetJson()
        EDICOES=data;SHA=sha;dirty=false
        document.getElementById('overlay').classList.add('hidden')
        render();setStatus('ok','conectado');iniciarPoll();atualizarNav()
      }catch(e){
        if(e==='auth')abrirOverlay('Token inválido. Cole o token novamente.')
        else if(e==='forbidden'){setStatus('err','sem permissão ou limite do GitHub — tentando de novo…');setTimeout(carregar,30000)}
        else{setStatus('err','sem conexão — tentando de novo…');setTimeout(carregar,8000)}
      }
    }
    function agendarSalvar(){dirty=true;setStatus('save','editando…');clearTimeout(saveTimer);saveTimer=setTimeout(salvar,1200)}
    async function salvar(){
      if(saving){clearTimeout(saveTimer);saveTimer=setTimeout(salvar,600);return}
      saving=true;setStatus('save','salvando…')
      try{SHA=await ghPutJson(EDICOES,SHA);dirty=false;setStatus('ok','salvo ✓')}
      catch(e){
        if(e==='auth')abrirOverlay('Token inválido ou expirado.')
        else if(e==='conflict')await resolverConflito()
        else{setStatus('err','erro ao salvar — tentando…');clearTimeout(saveTimer);saveTimer=setTimeout(salvar,3000)}
      }finally{saving=false}
    }
    async function resolverConflito(){
      try{
        const remoto=await ghGetJson()
        if(confirm('Outra pessoa salvou enquanto você editava.\n\nOK = manter SUAS alterações (sobrescreve as dela)\nCancelar = carregar a versão dela (perde as suas)')){
          SHA=remoto.sha;await salvar()
        }else{EDICOES=remoto.data;SHA=remoto.sha;dirty=false;render();setStatus('ok','atualizado')}
      }catch{setStatus('err','erro de sincronização')}
    }
    let pollT=null
    function iniciarPoll(){
      clearInterval(pollT)
      pollT=setInterval(async()=>{
        if(dirty||saving||!TOKEN)return
        try{
          const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH+'&t='+Date.now(),{headers:headers(),cache:'no-store'})
          if(!res.ok)return
          const j=await res.json()
          if(j.sha&&j.sha!==SHA){EDICOES=JSON.parse(b64d(j.content));SHA=j.sha;render();setStatus('ok','atualizado por outro PC')}
        }catch{}
      },20000)
    }

    // ── Overlay token ──
    function abrirOverlay(erro){
      const ov=document.getElementById('overlay');ov.classList.remove('hidden')
      const e=document.getElementById('tokErr')
      if(erro){e.textContent=erro;e.style.display='block'}else e.style.display='none'
      setStatus('err','desconectado')
      if(!erro)armarGesto()
    }
    // após o 1º gesto do usuário, o navegador revela o token do autofill → conecta sozinho
    function armarGesto(){
      const h=()=>{
        document.removeEventListener('pointerdown',h);document.removeEventListener('keydown',h)
        setTimeout(()=>{
          if(document.getElementById('overlay').classList.contains('hidden'))return
          const v=document.getElementById('tokInput').value.trim()
          if(v)document.getElementById('tokSave').click()
        },60)
      }
      document.addEventListener('pointerdown',h);document.addEventListener('keydown',h)
    }
    document.getElementById('tokSave').onclick=async()=>{
      const v=document.getElementById('tokInput').value.trim();if(!v)return
      TOKEN=v
      try{
        const {data,sha}=await ghGetJson()
        salvarToken(TOKEN)
        EDICOES=data;SHA=sha;dirty=false
        document.getElementById('overlay').classList.add('hidden')
        render();setStatus('ok','conectado');iniciarPoll();atualizarNav()
      }catch(e){TOKEN='';const er=document.getElementById('tokErr');er.textContent='Não consegui conectar. Confira o token e a permissão Contents.';er.style.display='block'}
    }
    document.getElementById('tokInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('tokSave').click()})
    document.getElementById('btnToken').onclick=()=>{if(confirm('Desconectar este navegador?')){limparToken();TOKEN='';clearInterval(pollT);abrirOverlay()}}
    document.getElementById('btnLink').onclick=()=>{
      if(!TOKEN){alert('Conecte primeiro (cole o token) e depois copie o link.');return}
      const url=location.origin+location.pathname+'#tk='+encodeURIComponent(TOKEN)
      const msg='✅ Link de acesso copiado!\n\nSalve nos FAVORITOS. Abrindo por esse favorito, conecta sozinho — sem digitar nada.\n\n⚠️ O link contém seu token (funciona como senha). Não compartilhe publicamente; mande só pra equipe por canal privado.'
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>alert(msg)).catch(()=>prompt('Copie o link de acesso:',url))}
      else prompt('Copie o link de acesso:',url)
    }

    // ── Edições ──
    function novaEdicao(){return{id:uid(),data:'',imgDia:{img:null,thumb:null,artista:'',ano:'',link:''},artistaDia:{img:null,thumb:null,nome:'',link:''}}}
    function find(id){return EDICOES.find(e=>e.id===id)}
    // rascunhos (sem data) no topo; depois por data crescente (próxima primeiro)
    function ordenar(){EDICOES.sort((a,b)=>(!a.data&&!b.data)?0:!a.data?-1:!b.data?1:a.data<b.data?-1:a.data>b.data?1:0)}
    function rotulo(e){
      if(!e.data)return 'Rascunho'
      const d=new Date(e.data+'T12:00:00')
      const wd=d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','')
      const dm=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})
      return `${wd} · ${dm}`
    }

    // conteúdo interno do .upload (preview com imagem, ou área de enviar)
    function uploadInner(bloco, sha){
      if(sha){
        return `<div class="up-preview">
            <img data-sha="${sha}" alt="">
            <div class="up-actions">
              <button class="mini" data-upbtn>Trocar</button>
              <button class="mini" data-dl="${bloco}">↓ original</button>
            </div>
          </div>
          <input type="file" accept="image/*">
          <div class="up-loading" hidden>enviando…</div>`
      }
      return `<div class="up-area" data-upbtn>+ Enviar imagem</div>
        <input type="file" accept="image/*">
        <div class="up-loading" hidden>enviando…</div>`
    }
    function imgField(e,bloco,titulo){
      const t=e[bloco].thumb
      return `<div class="field"><label>${titulo}</label>
        <div class="upload" data-b="${bloco}">${uploadInner(bloco, t&&t.sha)}</div></div>`
    }

    function cardHTML(e){
      return `<div class="card" data-id="${e.id}">
          <div class="card-head">
            <span class="card-num ${e.data?'':'rascunho'}">${rotulo(e)}</span>
            <input class="date-field" type="date" data-f="data" value="${e.data||''}">
            <div class="sp"></div>
            <button class="del" title="Remover" data-del="${e.id}">✕</button>
          </div>
          <div class="blocks">
            <div class="block">
              <div class="block-title">Imagem do dia</div>
              ${imgField(e,'imgDia','Imagem (original)')}
              <div class="row2">
                <div class="field"><label>Artista</label><input data-b="imgDia" data-f="artista" value="${esc(e.imgDia.artista)}" placeholder="Nome"></div>
                <div class="field"><label>Ano</label><input data-b="imgDia" data-f="ano" value="${esc(e.imgDia.ano)}" placeholder="1956"></div>
              </div>
              <div class="field"><label>Link</label><input data-b="imgDia" data-f="link" value="${esc(e.imgDia.link)}" placeholder="https://…"></div>
            </div>
            <div class="block">
              <div class="block-title">Artista do dia</div>
              ${imgField(e,'artistaDia','Imagem (original)')}
              <div class="field"><label>Nome</label><input data-b="artistaDia" data-f="nome" value="${esc(e.artistaDia.nome)}" placeholder="Nome do artista"></div>
              <div class="field"><label>Link</label><input data-b="artistaDia" data-f="link" value="${esc(e.artistaDia.link)}" placeholder="https://…"></div>
            </div>
          </div>
        </div>`
    }

    function render(){
      const lista=document.getElementById('lista')
      if(!EDICOES.length){lista.innerHTML=`<div class="empty">Nenhuma edição planejada ainda.<br>Clique em <b>+ Nova edição</b> para começar.</div>`;return}
      ordenar()
      const hoje=new Date().toISOString().slice(0,10)
      const futuras=EDICOES.filter(e=>!e.data||e.data>=hoje)
      const passadas=EDICOES.filter(e=>e.data&&e.data<hoje)
      const salvarHTML=`<div class="salvar-wrap"><button class="btn primary" id="btnSalvar" type="button">💾 Salvar</button></div>`
      let html=futuras.length
        ? futuras.map((e,i)=>cardHTML(e)+(i===0?salvarHTML:'')).join('')
        : `<div class="empty" style="padding:50px 20px">Nenhuma edição próxima. Clique em <b>+ Nova edição</b>.</div>`
      if(passadas.length)html+=`<div class="past-sep" id="pastSep"><span>▸ Edições anteriores (${passadas.length})</span></div><div id="pastList" style="display:none"></div>`
      lista.innerHTML=html
      document.querySelectorAll('#lista input').forEach(i=>i.setAttribute('autocomplete','off'))
      document.querySelectorAll('#lista > .card img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))
      const sep=document.getElementById('pastSep')
      if(sep)sep.onclick=()=>{
        const pl=document.getElementById('pastList')
        if(!pl.dataset.loaded){pl.innerHTML=passadas.map(cardHTML).join('');pl.dataset.loaded='1';pl.querySelectorAll('img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))}
        const aberto=pl.style.display==='none'
        pl.style.display=aberto?'block':'none'
        sep.querySelector('span').textContent=`${aberto?'▾':'▸'} Edições anteriores (${passadas.length})`
      }
      if(alvo&&!alvoFeito){alvoFeito=true;setTimeout(()=>focarEdicao(alvo),80)}
    }

    // rola até uma edição (vinda do calendário via #id) e destaca; expande passadas se preciso
    function focarEdicao(id){
      let card=document.querySelector(`#lista > .card[data-id="${id}"]`)
      if(!card){const sep=document.getElementById('pastSep');if(sep){sep.onclick();card=document.querySelector(`#pastList .card[data-id="${id}"]`)}}
      if(card){card.scrollIntoView({behavior:'smooth',block:'center'});card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),2200)}
    }

    async function carregarSha(sha){
      if(!sha)return
      if(blobCache[sha]){aplicar(sha);return}
      try{blobCache[sha]='data:image/jpeg;base64,'+await ghGetBlobB64(sha);aplicar(sha)}catch{}
    }
    function aplicar(sha){document.querySelectorAll(`img[data-sha="${sha}"]`).forEach(im=>im.src=blobCache[sha])}

    async function uploadImagem(card,bloco,file){
      const e=find(card.dataset.id);if(!e)return
      if(file.size>30*1024*1024){alert('Imagem muito grande (máx 30MB).');return}
      const up=card.querySelector(`.upload[data-b="${bloco}"]`)
      const loading=up.querySelector('.up-loading');if(loading)loading.hidden=false
      setStatus('save','enviando imagem…')
      try{
        const ext=((file.name.match(/\.([a-z0-9]+)$/i)||[])[1]||'jpg').toLowerCase()
        const origB64=await fileToB64(file)
        const origSha=await ghPutFile(`imgs/${e.id}-${bloco}.${ext}`,origB64)
        const thumbB64=await makeThumb(file)
        const thumbSha=await ghPutFile(`thumbs/${e.id}-${bloco}.jpg`,thumbB64)
        e[bloco].img={path:`imgs/${e.id}-${bloco}.${ext}`,sha:origSha,name:file.name,type:file.type||'image/jpeg'}
        e[bloco].thumb={path:`thumbs/${e.id}-${bloco}.jpg`,sha:thumbSha}
        blobCache[thumbSha]='data:image/jpeg;base64,'+thumbB64
        // atualiza SÓ o quadradinho desse bloco (sem re-render geral, não perde nada)
        up.innerHTML=uploadInner(bloco,thumbSha)
        const im=up.querySelector('img[data-sha]'); if(im) im.src=blobCache[thumbSha]
        agendarSalvar()
      }catch(err){if(loading)loading.hidden=true;setStatus('err','erro no upload');alert('Erro ao enviar a imagem. Confira a conexão e tente de novo.')}
    }

    async function baixarOriginal(meta){
      if(!meta||!meta.sha)return
      try{
        const b64=await ghGetBlobB64(meta.sha)
        const bin=atob(b64);const arr=new Uint8Array(bin.length)
        for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i)
        const blob=new Blob([arr],{type:meta.type||'application/octet-stream'})
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=meta.name||'imagem';a.click();URL.revokeObjectURL(a.href)
      }catch{alert('Erro ao baixar a imagem.')}
    }

    // ── Eventos ──
    const lista=document.getElementById('lista')
    lista.addEventListener('input',ev=>{
      const inp=ev.target,card=inp.closest('.card');if(!card)return
      const e=find(card.dataset.id);if(!e)return
      const f=inp.dataset.f,b=inp.dataset.b
      if(inp.type==='file'||!f)return
      if(b)e[b][f]=inp.value;else e[f]=inp.value
      agendarSalvar()
    })
    lista.addEventListener('change',ev=>{
      const inp=ev.target,card=inp.closest('.card');if(!card)return
      if(inp.type==='file'){const up=inp.closest('.upload');const file=inp.files[0];if(file)uploadImagem(card,up.dataset.b,file);inp.value='';return}
      if(inp.dataset.f==='data'){ordenar();render();agendarSalvar()}
    })
    lista.addEventListener('click',ev=>{
      const t=ev.target
      const sb=t.closest('#btnSalvar'); if(sb){salvarManual(sb);return}
      if(t.dataset.upbtn!==undefined){const up=t.closest('.upload');up.querySelector('input[type=file]').click();return}
      if(t.dataset.dl){const card=t.closest('.card');const e=find(card.dataset.id);baixarOriginal(e[t.dataset.dl].img);return}
      if(t.dataset.del){if(confirm('Remover esta edição?')){EDICOES=EDICOES.filter(e=>e.id!==t.dataset.del);render();agendarSalvar()}}
    })

    function adicionar(){
      const e=novaEdicao();EDICOES.unshift(e);render();agendarSalvar()
      window.scrollTo({top:0,behavior:'smooth'})
      const f=document.querySelector(`.card[data-id="${e.id}"] .date-field`);if(f)f.focus()
    }
    document.getElementById('btnNova').onclick=adicionar
    async function salvarManual(b){
      if(!TOKEN){abrirOverlay();return}
      clearTimeout(saveTimer)
      b.classList.add('saving')
      await salvar()
      b.classList.remove('saving')
      if(document.getElementById('status').classList.contains('ok')){
        const orig=b.innerHTML
        b.classList.add('saved'); b.innerHTML='✓ Salvo!'
        setTimeout(()=>{b.classList.remove('saved'); b.innerHTML=orig}, 1500)
      }
    }

    atualizarNav()
    carregar()
  </script>
</body>
</html>
