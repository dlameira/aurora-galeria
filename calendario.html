<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora · Calendário</title>
  <style>
    :root{--bg:#000;--panel:#0d0d0d;--field:#161616;--text:#f2f2f2;--muted:#8a8a8a;--line:#242424;--accent:#e0653a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}

    .top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:18px 26px;display:flex;align-items:center;gap:14px}
    .top h1{font-size:15px;font-weight:600;letter-spacing:.02em}
    .top h1 span{color:var(--muted);font-weight:400}
    .top .sp{flex:1}
    .status{font-size:11.5px;color:var(--muted)}
    .btn.link{background:transparent;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;padding:6px}
    .btn.link:hover{color:var(--text)}

    .wrap{max-width:1240px;margin:0 auto;padding:8px 22px 70px}
    .month{font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
      padding:30px 4px 14px;border-bottom:1px solid var(--line);margin-bottom:22px}
    .month:first-of-type{padding-top:18px}

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:8px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:620px){.grid{grid-template-columns:1fr}}

    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
    .cover{position:relative;background:#111;aspect-ratio:4/3;overflow:hidden}
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .cover .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#444;font-size:12px}
    .chip{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);
      border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 10px;text-align:center;line-height:1.05}
    .chip .d{font-size:18px;font-weight:700}
    .chip .m{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#ddd}
    .cover .dl{position:absolute;bottom:10px;right:10px}

    .body{padding:14px 15px 15px;display:flex;flex-direction:column;gap:10px;flex:1}
    .artista{font-size:16px;font-weight:600;letter-spacing:.01em;line-height:1.15}
    .artista .ano{color:var(--muted);font-weight:400}
    .artista.empty{color:var(--muted);font-style:italic;font-weight:400;font-size:14px}
    .artrow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .editbtn{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;padding:2px 4px;border-radius:5px;text-decoration:none}
    .editbtn:hover{color:var(--accent)}
    .links{display:flex;flex-wrap:wrap;gap:7px}
    .pill{font-size:11.5px;border:1px solid var(--line);background:var(--field);border-radius:20px;padding:5px 11px;color:var(--text);display:inline-flex;align-items:center;gap:5px;cursor:pointer}
    .pill:hover{border-color:#555}
    .pill.ghost{color:var(--muted)}

    .artblock{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:11px}
    .artblock .mini{width:46px;height:46px;border-radius:8px;object-fit:cover;background:#111;flex-shrink:0}
    .artblock .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .artblock .adnome{font-size:13px;font-weight:600;line-height:1.2;margin-bottom:6px}
    .artblock .col{flex:1;min-width:0}

    .empty-all{text-align:center;color:var(--muted);padding:90px 20px;font-size:14px;line-height:1.7}
    .past-wrap{margin-bottom:8px}
    .past-wrap summary{cursor:pointer;color:var(--muted);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;padding:18px 4px;list-style:none}
    .past-wrap summary::-webkit-details-marker{display:none}
    .past-wrap summary::before{content:'▸ '}
    .past-wrap[open] summary::before{content:'▾ '}
    .past-wrap summary:hover{color:var(--text)}
    .past-wrap[open]{border-bottom:1px solid var(--line);margin-bottom:20px}
    .dl-btn{font:inherit;font-size:10.5px;font-weight:500;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);color:#fff;cursor:pointer}
    .dl-btn:hover{background:rgba(0,0,0,.85)}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .overlay.hidden{display:none}
    .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:460px;width:100%}
    .modal h2{font-size:17px;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
    .modal input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:8px;color:var(--text);font:inherit;font-size:13px;padding:11px 12px;outline:none;margin-bottom:12px}
    .modal .err{color:#e0563a;font-size:12px;margin-bottom:10px;display:none}
    .modal a{color:var(--accent)}
    .modal ol{font-size:12.5px;color:var(--muted);line-height:1.7;margin:8px 0 0 18px}
    .modal ol b{color:var(--text)}
    .btn{font:inherit;font-size:12.5px;font-weight:500;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--accent);border-color:var(--accent);color:#fff;width:100%}

    /* ── Calendário (grade do mês) ── */
    .viewbar{display:inline-flex;gap:2px;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:3px;margin:6px 0 18px}
    .vb{font:inherit;font-size:12px;font-weight:500;padding:7px 14px;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
    .vb:hover{color:var(--text)}
    .vb.active{background:var(--accent);color:#fff}
    .cal-day.vazio{cursor:pointer}
    .cal-plus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3a3a3a;font-size:22px;opacity:0;transition:opacity .15s}
    .cal-day.vazio:hover{border-color:var(--accent)}
    .cal-day.vazio:hover .cal-plus{opacity:1;color:var(--accent)}
    .pill.copy{padding:5px 9px;font-size:13px}
    .cal-month{margin-bottom:38px}
    .cal-title{font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text);padding:22px 2px 14px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
    .cal-wd{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:center;padding:0 0 4px}
    .cal-day{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
    .cal-day.empty{border:none;background:transparent}
    .cal-num{position:absolute;top:5px;left:8px;font-size:11px;font-weight:600;color:var(--muted);z-index:2}
    .cal-day.has{cursor:grab}
    .cal-day.has:active{cursor:grabbing}
    .cal-day.dragging{opacity:.35}
    .cal-day.drop-hover{outline:2px solid var(--accent);outline-offset:-2px}
    .cal-day.drop-hover::after{content:'';position:absolute;inset:0;background:rgba(224,101,58,.18);z-index:3}
    .cal-day.has .cal-num{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9)}
    .cal-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#161616;transition:transform .3s}
    .cal-day.has:hover .cal-img{transform:scale(1.06)}
    .cal-cap{position:absolute;left:0;right:0;bottom:0;z-index:2;background:linear-gradient(transparent,rgba(0,0,0,.85));color:#fff;font-size:10px;font-weight:600;line-height:1.15;padding:16px 6px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .semdata{display:flex;flex-wrap:wrap;gap:7px;padding:0 2px 10px}
    @media (max-width:680px){.cal-grid{gap:4px}.cal-cap{font-size:8px;padding:12px 4px 4px}.cal-num{font-size:9px;left:5px;top:4px}}

    /* ── Modal de detalhe do dia ── */
    .det{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:40;display:flex;align-items:center;justify-content:center;padding:20px}
    .det.hidden{display:none}
    .det-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow:auto}
    .det-head{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1}
    .det-head .data{font-size:14px;font-weight:600;text-transform:capitalize}
    .det-head .sp{flex:1}
    .det-edit{font-size:12px;color:var(--muted);white-space:nowrap}
    .det-edit:hover{color:var(--accent)}
    .det-x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
    .det-x:hover{color:var(--text)}
    .det-body{padding:18px 20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
    @media (max-width:600px){.det-body{grid-template-columns:1fr}}
    .det-sec h3{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .det-img{width:100%;border-radius:10px;background:#161616;display:block;margin-bottom:10px;max-height:320px;object-fit:contain}
    .det-name{font-size:17px;font-weight:600;line-height:1.2}
    .det-name .ano{color:var(--muted);font-weight:400}
    .det-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}

    /* ── Tela de inclusão (form no modal) ── */
    .inc-tit{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
    .inc-date{background:var(--field);border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;font-size:12.5px;padding:6px 10px;color-scheme:dark}
    .inc-status{font-size:11.5px;color:var(--muted)}
    .inc-foot{padding:0 20px 22px;display:flex;justify-content:flex-end}
    #incSalvar{width:auto;padding:11px 30px;font-size:14px;transition:transform .12s,filter .12s,background .25s,border-color .25s}
    #incSalvar:hover{filter:brightness(1.08);transform:translateY(-1px)}
    #incSalvar:active{transform:scale(.96)}
    #incSalvar.saved{background:#5fb87a;border-color:#5fb87a;animation:popS .4s}
    @keyframes popS{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}
    .inc-block h3{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .inc-field{margin-top:9px}
    .inc-field label{display:block;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .inc-field input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;font-size:13px;padding:8px 10px;outline:none}
    .inc-field input:focus{border-color:#444}
    .inc-row2{display:flex;gap:9px}.inc-row2 .inc-field{flex:1}
    /* upload */
    .upload{position:relative}
    .up-area{border:1px dashed var(--line);border-radius:8px;padding:26px 12px;text-align:center;cursor:pointer;color:var(--muted);font-size:12.5px;background:var(--bg);transition:border-color .15s,color .15s}
    .up-area:hover{border-color:#555;color:var(--text)}
    .up-preview{position:relative;border-radius:8px;overflow:hidden;background:#000}
    .up-preview img{width:100%;max-height:230px;object-fit:cover;display:block}
    .up-actions{position:absolute;left:6px;right:6px;bottom:6px;display:flex;gap:6px;justify-content:flex-end}
    .mini{font:inherit;font-size:10.5px;font-weight:500;padding:4px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.66);color:#fff;cursor:pointer;backdrop-filter:blur(2px)}
    .mini:hover{background:rgba(0,0,0,.85)}
    .up-loading{font-size:11px;color:#d99a3a;margin-top:6px;text-align:center}
    .upload input[type=file]{display:none}
  </style>
</head>
<body>
  <div class="top">
    <h1>Aurora <span>· Calendário</span></h1>
    <div class="sp"></div>
    <span class="status" id="status"></span>
    <button class="btn link" id="btnReload" title="Atualizar">↻</button>
    <button class="btn link" id="btnLink" title="Copiar link de acesso (salve nos favoritos)">🔗 acesso</button>
    <button class="btn link" id="btnToken">sair</button>
  </div>

  <div class="wrap" id="wrap">
    <div class="empty-all">Carregando…</div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2>Acessar o calendário</h2>
      <p>Cole o <b>token do GitHub</b> para ver o planejamento.</p>
      <div class="err" id="tokErr"></div>
      <input type="text" id="tokInput" placeholder="github_pat_..." autocomplete="off" spellcheck="false" style="-webkit-text-security:disc">
      <button class="btn" id="tokSave">Entrar</button>
    </div>
  </div>

  <div class="det hidden" id="det">
    <div class="det-box">
      <div class="det-head">
        <span class="inc-tit">Inclusão</span>
        <input class="inc-date" id="incDate" type="date">
        <div class="sp"></div>
        <span class="inc-status" id="incStatus"></span>
        <button class="det-x" id="detClose">✕</button>
      </div>
      <div class="det-body" id="detBody"></div>
      <div class="inc-foot"><button class="btn" id="incSalvar">💾 Salvar</button></div>
    </div>
  </div>

  <script>
    const OWNER='dlameira', REPO='aurora-planejamento', FILE='planejamento.json', BRANCH='main'
    const TOKEN_KEY='aurora_plan_token'
    const CONTENTS=`https://api.github.com/repos/${OWNER}/${REPO}/contents/`
    const BLOBS=`https://api.github.com/repos/${OWNER}/${REPO}/git/blobs/`
    let TOKEN='', EDICOES=[], SHA=null, editObj=null, editNew=false, incTimer=null
    const blobCache={}
    const ckSet=v=>{try{document.cookie=TOKEN_KEY+'='+encodeURIComponent(v)+';max-age=31536000;path=/;samesite=lax'+(location.protocol==='https:'?';secure':'')}catch{}}
    const ckGet=()=>{const m=document.cookie.match('(?:^|; )'+TOKEN_KEY+'=([^;]*)');return m?decodeURIComponent(m[1]):''}
    const lsGet=()=>{try{return localStorage.getItem(TOKEN_KEY)||''}catch{return ''}}
    function salvarToken(v){try{localStorage.setItem(TOKEN_KEY,v)}catch{};ckSet(v)}
    function limparToken(){try{localStorage.removeItem(TOKEN_KEY)}catch{};try{document.cookie=TOKEN_KEY+'=;max-age=0;path=/'}catch{}}
    ;(function(){
      const hp={};(location.hash||'').replace(/^#/,'').split('&').forEach(p=>{const i=p.indexOf('=');if(i>0)hp[p.slice(0,i)]=decodeURIComponent(p.slice(i+1))})
      if(hp.tk){TOKEN=hp.tk;salvarToken(TOKEN)}
      if(!TOKEN)TOKEN=lsGet()||ckGet()
      if(location.hash)history.replaceState(null,'',location.pathname)
    })()
    const headers=()=>({Authorization:'Bearer '+TOKEN,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'})
    const b64d=b=>decodeURIComponent(escape(atob((b||'').replace(/\s/g,''))))
    const esc=s=>(s||'').replace(/"/g,'&quot;')
    const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
    const ABREV=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ']

    async function ghGetBlobB64(sha){const r=await fetch(BLOBS+sha,{headers:headers()});if(!r.ok)throw 0;return ((await r.json()).content||'').replace(/\s/g,'')}

    // ── Salvar / upload (trazido do editor) ──
    const b64e=s=>btoa(unescape(encodeURIComponent(s)))
    const uid=()=>'e'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36)
    const fileToB64=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})
    function novaEdicao(){return{id:uid(),data:'',imgDia:{img:null,thumb:null,artista:'',ano:'',link:''},artistaDia:{img:null,thumb:null,nome:'',link:''}}}
    function makeThumb(file,maxDim=1000,q=0.85){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');x.fillStyle='#111';x.fillRect(0,0,w,h);x.drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q).split(',')[1]);URL.revokeObjectURL(img.src)};img.onerror=rej;img.src=URL.createObjectURL(file)})}
    async function ghPutJson(){
      const body={message:'planejamento',content:b64e(JSON.stringify(EDICOES,null,2)),branch:BRANCH};if(SHA)body.sha=SHA
      let res=await fetch(CONTENTS+FILE,{method:'PUT',headers:headers(),body:JSON.stringify(body)})
      if(res.status===409||res.status===422){const g=await fetch(CONTENTS+FILE+'?ref='+BRANCH,{headers:headers()});if(g.ok){SHA=(await g.json()).sha;body.sha=SHA;res=await fetch(CONTENTS+FILE,{method:'PUT',headers:headers(),body:JSON.stringify(body)})}}
      if(!res.ok)throw 'put '+res.status
      SHA=(await res.json()).content.sha
    }
    async function ghPutFile(path,b64){
      let sha=null;try{const g=await fetch(CONTENTS+path+'?ref='+BRANCH,{headers:headers()});if(g.ok)sha=(await g.json()).sha}catch{}
      const body={message:'imagem',content:b64,branch:BRANCH};if(sha)body.sha=sha
      const r=await fetch(CONTENTS+path,{method:'PUT',headers:headers(),body:JSON.stringify(body)});if(!r.ok)throw 'put '+r.status
      return (await r.json()).content.sha
    }
    function uploadInner(bloco,sha){
      if(sha)return `<div class="up-preview"><img data-sha="${sha}" alt=""><div class="up-actions"><button class="mini" data-upbtn>Trocar</button><button class="mini" data-dl-b="${bloco}">↓ baixar</button></div></div><input type="file" accept="image/*"><div class="up-loading" hidden>enviando…</div>`
      return `<div class="up-area" data-upbtn>+ Enviar imagem</div><input type="file" accept="image/*"><div class="up-loading" hidden>enviando…</div>`
    }

    async function carregar(){
      if(!TOKEN){abrir();return}
      document.getElementById('status').textContent='carregando…'
      try{
        const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH+'&t='+Date.now(),{headers:headers(),cache:'no-store'})
        if(res.status===401||res.status===403){abrir('Token sem acesso ao repositório.');return}
        if(!res.ok)throw 0
        const j=await res.json()
        EDICOES=JSON.parse(b64d(j.content))||[]
        if(!Array.isArray(EDICOES))EDICOES=[]
        SHA=j.sha
        document.getElementById('overlay').classList.add('hidden')
        render();document.getElementById('status').textContent=''
      }catch{document.getElementById('status').textContent='erro ao carregar'}
    }

    const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
    let vista='dia'  // 'dia' = imagem do dia | 'artista' = imagem do artista do dia
    function mesGridHTML(ym, dias){
      const [ano,mes]=ym.split('-').map(Number)
      const nDias=new Date(ano,mes,0).getDate()
      const off=new Date(ano,mes-1,1).getDay() // 0=Dom
      let cells=''
      for(let i=0;i<off;i++)cells+='<div class="cal-day empty"></div>'
      for(let d=1;d<=nDias;d++){
        const e=dias[d]
        const dd=`${ym}-${String(d).padStart(2,'0')}`
        if(e){
          const obj = vista==='dia' ? (e.imgDia||{}) : (e.artistaDia||{})
          const t = obj.thumb && obj.thumb.sha
          const nome = vista==='dia'
            ? (e.imgDia&&e.imgDia.artista?esc(e.imgDia.artista):'Aurora')
            : (e.artistaDia&&e.artistaDia.nome?esc(e.artistaDia.nome):'Artista do dia')
          cells+=`<div class="cal-day has" draggable="true" data-ed="${e.id}" title="${nome}">
            <div class="cal-num">${d}</div>
            ${t?`<img class="cal-img" draggable="false" data-sha="${obj.thumb.sha}" alt="">`:'<div class="cal-img"></div>'}
            <div class="cal-cap">${nome}</div>
          </div>`
        } else cells+=`<div class="cal-day vazio" data-new="${dd}" title="Criar edição em ${d}/${mes}"><div class="cal-num">${d}</div><div class="cal-plus">+</div></div>`
      }
      return `<div class="cal-month"><div class="cal-title">${MESES[mes-1]} ${ano}</div>
        <div class="cal-grid">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')}${cells}</div></div>`
    }

    function render(){
      const wrap=document.getElementById('wrap')
      if(!EDICOES.length){wrap.innerHTML='<div class="empty-all">Nenhuma edição planejada ainda.</div>';return}
      const dated=EDICOES.filter(e=>e.data)
      const semData=EDICOES.filter(e=>!e.data)
      const byYM={}
      dated.forEach(e=>{const ym=e.data.slice(0,7);(byYM[ym]=byYM[ym]||{})[+e.data.slice(8,10)]=e})
      const yms=Object.keys(byYM).sort()
      const curYM=new Date().toISOString().slice(0,7)
      const futuros=yms.filter(ym=>ym>=curYM)
      const passados=yms.filter(ym=>ym<curYM)
      let html=`<div class="viewbar"><button class="vb ${vista==='dia'?'active':''}" data-view="dia">Imagem do dia</button><button class="vb ${vista==='artista'?'active':''}" data-view="artista">Artista do dia</button></div>`
      if(passados.length)html+=`<details class="past-wrap"><summary>Meses anteriores (${passados.length})</summary><div id="pastCal">${passados.map(ym=>mesGridHTML(ym,byYM[ym])).join('')}</div></details>`
      html+=`<div id="futCal">${futuros.length?futuros.map(ym=>mesGridHTML(ym,byYM[ym])).join(''):'<div class="empty-all">Nenhuma edição futura planejada.</div>'}</div>`
      if(semData.length)html+=`<div class="cal-title" style="border-top:1px solid var(--line);padding-top:22px">Sem data ainda</div><div class="semdata">${semData.map(e=>`<span class="pill" data-ed="${e.id}" style="cursor:pointer">${e.imgDia&&e.imgDia.artista?esc(e.imgDia.artista):'rascunho'}</span>`).join('')}</div>`
      wrap.innerHTML=html
      document.querySelectorAll('#futCal img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))
      const det=wrap.querySelector('.past-wrap')
      if(det)det.addEventListener('toggle',()=>{if(det.open)det.querySelectorAll('img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))})
    }
    async function carregarSha(sha){
      if(!sha)return
      if(blobCache[sha]){aplicar(sha);return}
      try{blobCache[sha]='data:image/jpeg;base64,'+await ghGetBlobB64(sha);aplicar(sha)}catch{}
    }
    function aplicar(sha){document.querySelectorAll(`img[data-sha="${sha}"]`).forEach(im=>im.src=blobCache[sha])}
    async function baixar(meta){
      if(!meta||!meta.sha)return
      try{
        const b64=await ghGetBlobB64(meta.sha);const bin=atob(b64);const arr=new Uint8Array(bin.length)
        for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i)
        const blob=new Blob([arr],{type:meta.type||'application/octet-stream'})
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=meta.name||'imagem';a.click();URL.revokeObjectURL(a.href)
      }catch{alert('Erro ao baixar.')}
    }

    // ── Tela de inclusão (criar/editar o dia ali mesmo) ──
    function abrirInclusao(opts){
      if(opts.id){editObj=EDICOES.find(e=>e.id===opts.id);editNew=false;if(!editObj)return}
      else{editObj=novaEdicao();editObj.data=opts.data||'';editNew=true}
      document.getElementById('incDate').value=editObj.data||''
      document.getElementById('incStatus').textContent=''
      renderInc()
      document.getElementById('det').classList.remove('hidden')
    }
    function linkRow(b,val){return `<div class="inc-field"><label>Link</label><div style="display:flex;gap:6px"><input data-b="${b}" data-f="link" value="${esc(val)}" placeholder="https://…" style="flex:1"><button class="mini" data-openf="${b}" title="Abrir">↗</button><button class="mini" data-copyf="${b}" title="Copiar">⧉</button></div></div>`}
    function renderInc(){
      const e=editObj
      document.getElementById('detBody').innerHTML=`
        <div class="inc-block det-sec"><h3>Imagem do dia</h3>
          <div class="upload" data-b="imgDia">${uploadInner('imgDia', e.imgDia.thumb&&e.imgDia.thumb.sha)}</div>
          <div class="inc-row2">
            <div class="inc-field"><label>Artista</label><input data-b="imgDia" data-f="artista" value="${esc(e.imgDia.artista)}" placeholder="Nome"></div>
            <div class="inc-field"><label>Ano</label><input data-b="imgDia" data-f="ano" value="${esc(e.imgDia.ano)}" placeholder="1956"></div>
          </div>
          ${linkRow('imgDia',e.imgDia.link)}
        </div>
        <div class="inc-block det-sec"><h3>Artista do dia</h3>
          <div class="upload" data-b="artistaDia">${uploadInner('artistaDia', e.artistaDia.thumb&&e.artistaDia.thumb.sha)}</div>
          <div class="inc-field"><label>Nome</label><input data-b="artistaDia" data-f="nome" value="${esc(e.artistaDia.nome)}" placeholder="Nome do artista"></div>
          ${linkRow('artistaDia',e.artistaDia.link)}
        </div>`
      document.querySelectorAll('#detBody img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))
    }
    function agendarInc(){document.getElementById('incStatus').textContent='editando…';clearTimeout(incTimer);incTimer=setTimeout(salvarInc,1000)}
    async function salvarInc(){
      clearTimeout(incTimer)
      if(editObj && editNew && !EDICOES.includes(editObj)){EDICOES.push(editObj);editNew=false}
      document.getElementById('incStatus').textContent='salvando…'
      try{await ghPutJson();document.getElementById('incStatus').textContent='salvo ✓';render()}
      catch(e){document.getElementById('incStatus').textContent='erro ao salvar'}
    }
    async function uploadInc(bloco,file,up){
      if(!editObj)return
      if(file.size>30*1024*1024){alert('Imagem muito grande (máx 30MB).');return}
      const loading=up.querySelector('.up-loading');if(loading)loading.hidden=false
      document.getElementById('incStatus').textContent='enviando imagem…'
      try{
        const ext=((file.name.match(/\.([a-z0-9]+)$/i)||[])[1]||'jpg').toLowerCase()
        const origSha=await ghPutFile(`imgs/${editObj.id}-${bloco}.${ext}`,await fileToB64(file))
        const thumbB64=await makeThumb(file)
        const thumbSha=await ghPutFile(`thumbs/${editObj.id}-${bloco}.jpg`,thumbB64)
        editObj[bloco].img={path:`imgs/${editObj.id}-${bloco}.${ext}`,sha:origSha,name:file.name,type:file.type||'image/jpeg'}
        editObj[bloco].thumb={path:`thumbs/${editObj.id}-${bloco}.jpg`,sha:thumbSha}
        blobCache[thumbSha]='data:image/jpeg;base64,'+thumbB64
        up.innerHTML=uploadInner(bloco,thumbSha)
        const im=up.querySelector('img[data-sha]');if(im)im.src=blobCache[thumbSha]
        agendarInc()
      }catch(err){if(loading)loading.hidden=true;document.getElementById('incStatus').textContent='erro no upload';alert('Erro ao enviar a imagem.')}
    }
    function fecharInc(){if(incTimer)salvarInc();document.getElementById('det').classList.add('hidden');editObj=null}

    // cliques na grade
    document.getElementById('wrap').addEventListener('click',ev=>{
      const vb=ev.target.closest('[data-view]');if(vb){vista=vb.dataset.view;render();return}
      const nv=ev.target.closest('[data-new]');if(nv){abrirInclusao({data:nv.dataset.new});return}
      const c=ev.target.closest('[data-ed]');if(c){abrirInclusao({id:c.dataset.ed});return}
    })

    // ── Arrastar para reagendar (move; se ocupado, troca as duas) ──
    let dragId=null
    const wrapEl=document.getElementById('wrap')
    wrapEl.addEventListener('dragstart',ev=>{
      const c=ev.target.closest('.cal-day.has'); if(!c){return}
      dragId=c.dataset.ed; ev.dataTransfer.effectAllowed='move'; try{ev.dataTransfer.setData('text/plain',dragId)}catch{}
      c.classList.add('dragging')
    })
    wrapEl.addEventListener('dragend',()=>{document.querySelectorAll('.dragging,.drop-hover').forEach(x=>x.classList.remove('dragging','drop-hover'));dragId=null})
    wrapEl.addEventListener('dragover',ev=>{const c=ev.target.closest('.cal-day');if(!dragId||!c||c.classList.contains('empty'))return;ev.preventDefault();ev.dataTransfer.dropEffect='move'})
    wrapEl.addEventListener('dragenter',ev=>{const c=ev.target.closest('.cal-day');if(!dragId||!c||c.classList.contains('empty'))return;document.querySelectorAll('.drop-hover').forEach(x=>x.classList.remove('drop-hover'));if(c.dataset.ed!==dragId)c.classList.add('drop-hover')})
    wrapEl.addEventListener('drop',ev=>{
      const c=ev.target.closest('.cal-day'); if(!dragId||!c||c.classList.contains('empty'))return
      ev.preventDefault()
      const dragged=EDICOES.find(e=>e.id===dragId)
      let alvoEd=null, alvoData=null
      if(c.dataset.new) alvoData=c.dataset.new
      else if(c.dataset.ed){alvoEd=EDICOES.find(e=>e.id===c.dataset.ed); alvoData=alvoEd?alvoEd.data:null}
      document.querySelectorAll('.drop-hover,.dragging').forEach(x=>x.classList.remove('drop-hover','dragging'))
      const id=dragId; dragId=null
      if(!dragged||!alvoData)return
      if(alvoEd&&alvoEd.id===dragged.id)return
      if(alvoEd){const tmp=dragged.data; dragged.data=alvoEd.data; alvoEd.data=tmp}  // troca
      else dragged.data=alvoData  // move
      salvarMover()
    })
    async function salvarMover(){
      document.getElementById('status').textContent='movendo…'
      try{await ghPutJson();render();document.getElementById('status').textContent=''}
      catch{document.getElementById('status').textContent='erro ao salvar';render()}
    }
    // cliques/edição dentro da tela de inclusão
    const detEl=document.getElementById('det')
    detEl.addEventListener('click',ev=>{ if(ev.target===detEl)fecharInc() })
    const dbody=document.getElementById('detBody')
    dbody.addEventListener('input',ev=>{
      const inp=ev.target;if(inp.type==='file')return
      const b=inp.dataset.b,f=inp.dataset.f;if(!b||!f||!editObj)return
      editObj[b][f]=inp.value;agendarInc()
    })
    dbody.addEventListener('change',ev=>{
      const inp=ev.target;if(inp.type!=='file')return
      const up=inp.closest('.upload');const file=inp.files[0];if(file)uploadInc(up.dataset.b,file,up);inp.value=''
    })
    dbody.addEventListener('click',ev=>{
      const t=ev.target
      if(t.dataset.upbtn!==undefined){t.closest('.upload').querySelector('input[type=file]').click();return}
      if(t.dataset.dlB!==undefined){const o=editObj&&editObj[t.dataset.dlB];baixar(o&&o.img);return}
      if(t.dataset.openf!==undefined){const l=editObj&&editObj[t.dataset.openf]&&editObj[t.dataset.openf].link;if(l)window.open(l,'_blank');return}
      if(t.dataset.copyf!==undefined){const l=editObj&&editObj[t.dataset.copyf]&&editObj[t.dataset.copyf].link;if(l){if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(l);const o=t.textContent;t.textContent='✓';setTimeout(()=>t.textContent=o,900)}return}
    })
    document.getElementById('incDate').addEventListener('change',ev=>{if(editObj){editObj.data=ev.target.value;agendarInc()}})
    document.getElementById('incSalvar').onclick=async()=>{const b=document.getElementById('incSalvar');await salvarInc();b.classList.add('saved');setTimeout(()=>b.classList.remove('saved'),900)}
    document.getElementById('detClose').onclick=fecharInc
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!document.getElementById('det').classList.contains('hidden'))fecharInc()})

    // token
    function abrir(erro){
      const ov=document.getElementById('overlay');ov.classList.remove('hidden')
      const e=document.getElementById('tokErr');if(erro){e.textContent=erro;e.style.display='block'}else e.style.display='none'
      if(!erro)armarGesto()
    }
    function armarGesto(){
      const h=()=>{
        document.removeEventListener('pointerdown',h);document.removeEventListener('keydown',h)
        setTimeout(()=>{
          if(document.getElementById('overlay').classList.contains('hidden'))return
          const v=document.getElementById('tokInput').value.trim()
          if(v)document.getElementById('tokSave').click()
        },60)
      }
      document.addEventListener('pointerdown',h);document.addEventListener('keydown',h)
    }
    document.getElementById('tokSave').onclick=async()=>{
      const v=document.getElementById('tokInput').value.trim();if(!v)return
      TOKEN=v
      try{
        const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH,{headers:headers()})
        if(!res.ok)throw 0
        salvarToken(TOKEN)
        document.getElementById('overlay').classList.add('hidden')
        carregar()
      }catch{TOKEN='';const e=document.getElementById('tokErr');e.textContent='Não consegui entrar. Confira o token.';e.style.display='block'}
    }
    document.getElementById('tokInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('tokSave').click()})
    document.getElementById('btnToken').onclick=()=>{if(confirm('Sair (remover token deste navegador)?')){limparToken();TOKEN='';abrir()}}
    document.getElementById('btnLink').onclick=()=>{
      if(!TOKEN){alert('Entre primeiro (cole o token) e depois copie o link.');return}
      const url=location.origin+location.pathname+'#tk='+encodeURIComponent(TOKEN)
      const msg='✅ Link de acesso copiado!\n\nSalve nos FAVORITOS. Abrindo por ele, entra sozinho.\n\n⚠️ O link contém o token (funciona como senha). Não compartilhe publicamente.'
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>alert(msg)).catch(()=>prompt('Copie o link:',url))}
      else prompt('Copie o link de acesso:',url)
    }
    document.getElementById('btnReload').onclick=carregar

    carregar()
  </script>
</body>
</html>
