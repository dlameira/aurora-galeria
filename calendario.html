<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora · Calendário</title>
  <style>
    :root{--bg:#000;--panel:#0d0d0d;--field:#161616;--text:#f2f2f2;--muted:#8a8a8a;--line:#242424;--accent:#e0653a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}

    .top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:18px 26px;display:flex;align-items:center;gap:14px}
    .top h1{font-size:15px;font-weight:600;letter-spacing:.02em}
    .top h1 span{color:var(--muted);font-weight:400}
    .top .sp{flex:1}
    .status{font-size:11.5px;color:var(--muted)}
    .btn.link{background:transparent;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;padding:6px}
    .btn.link:hover{color:var(--text)}

    .wrap{max-width:1240px;margin:0 auto;padding:8px 22px 70px}
    .month{font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
      padding:30px 4px 14px;border-bottom:1px solid var(--line);margin-bottom:22px}
    .month:first-of-type{padding-top:18px}

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:8px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:620px){.grid{grid-template-columns:1fr}}

    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
    .cover{position:relative;background:#111;aspect-ratio:4/3;overflow:hidden}
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .cover .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#444;font-size:12px}
    .chip{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);
      border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 10px;text-align:center;line-height:1.05}
    .chip .d{font-size:18px;font-weight:700}
    .chip .m{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#ddd}
    .cover .dl{position:absolute;bottom:10px;right:10px}

    .body{padding:14px 15px 15px;display:flex;flex-direction:column;gap:10px;flex:1}
    .artista{font-size:16px;font-weight:600;letter-spacing:.01em;line-height:1.15}
    .artista .ano{color:var(--muted);font-weight:400}
    .artista.empty{color:var(--muted);font-style:italic;font-weight:400;font-size:14px}
    .artrow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .editbtn{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;padding:2px 4px;border-radius:5px;text-decoration:none}
    .editbtn:hover{color:var(--accent)}
    .links{display:flex;flex-wrap:wrap;gap:7px}
    .pill{font-size:11.5px;border:1px solid var(--line);background:var(--field);border-radius:20px;padding:5px 11px;color:var(--text);display:inline-flex;align-items:center;gap:5px;cursor:pointer}
    .pill:hover{border-color:#555}
    .pill.ghost{color:var(--muted)}

    .artblock{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:11px}
    .artblock .mini{width:46px;height:46px;border-radius:8px;object-fit:cover;background:#111;flex-shrink:0}
    .artblock .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .artblock .adnome{font-size:13px;font-weight:600;line-height:1.2;margin-bottom:6px}
    .artblock .col{flex:1;min-width:0}

    .empty-all{text-align:center;color:var(--muted);padding:90px 20px;font-size:14px;line-height:1.7}
    .past-wrap{margin-bottom:8px}
    .past-wrap summary{cursor:pointer;color:var(--muted);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;padding:18px 4px;list-style:none}
    .past-wrap summary::-webkit-details-marker{display:none}
    .past-wrap summary::before{content:'▸ '}
    .past-wrap[open] summary::before{content:'▾ '}
    .past-wrap summary:hover{color:var(--text)}
    .past-wrap[open]{border-bottom:1px solid var(--line);margin-bottom:20px}
    .dl-btn{font:inherit;font-size:10.5px;font-weight:500;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.6);color:#fff;cursor:pointer}
    .dl-btn:hover{background:rgba(0,0,0,.85)}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .overlay.hidden{display:none}
    .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:460px;width:100%}
    .modal h2{font-size:17px;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px}
    .modal input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:8px;color:var(--text);font:inherit;font-size:13px;padding:11px 12px;outline:none;margin-bottom:12px}
    .modal .err{color:#e0563a;font-size:12px;margin-bottom:10px;display:none}
    .modal a{color:var(--accent)}
    .modal ol{font-size:12.5px;color:var(--muted);line-height:1.7;margin:8px 0 0 18px}
    .modal ol b{color:var(--text)}
    .btn{font:inherit;font-size:12.5px;font-weight:500;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--accent);border-color:var(--accent);color:#fff;width:100%}
  </style>
</head>
<body>
  <div class="top">
    <h1>Aurora <span>· Calendário editorial</span></h1>
    <div class="sp"></div>
    <span class="status" id="status">—</span>
    <a class="btn link" id="navEdit" href="planejamento.html">✎ editar</a>
    <button class="btn link" id="btnLink" title="Copiar link que conecta sozinho">🔗 link</button>
    <button class="btn link" id="btnReload">atualizar</button>
    <button class="btn link" id="btnToken">sair</button>
  </div>

  <div class="wrap" id="wrap">
    <div class="empty-all">Carregando…</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Acessar o calendário</h2>
      <p>Cole o <b>token do GitHub</b> para ver o planejamento.</p>
      <div class="err" id="tokErr"></div>
      <input type="password" id="tokInput" name="token" placeholder="github_pat_..." autocomplete="current-password">
      <button class="btn" id="tokSave">Entrar</button>
    </div>
  </div>

  <script>
    const OWNER='dlameira', REPO='aurora-planejamento', FILE='planejamento.json', BRANCH='main'
    const TOKEN_KEY='aurora_plan_token'
    const CONTENTS=`https://api.github.com/repos/${OWNER}/${REPO}/contents/`
    const BLOBS=`https://api.github.com/repos/${OWNER}/${REPO}/git/blobs/`
    let TOKEN='', EDICOES=[]
    const blobCache={}
    ;(function(){
      const hp={};(location.hash||'').replace(/^#/,'').split('&').forEach(p=>{const i=p.indexOf('=');if(i>0)hp[p.slice(0,i)]=decodeURIComponent(p.slice(i+1))})
      if(hp.tk){TOKEN=hp.tk;try{localStorage.setItem(TOKEN_KEY,TOKEN)}catch{}}
      if(!TOKEN)TOKEN=localStorage.getItem(TOKEN_KEY)||''
      if(location.hash)history.replaceState(null,'',location.pathname)
    })()
    function atualizarNav(){const e=document.getElementById('navEdit');if(e)e.href='planejamento.html'+(TOKEN?('#tk='+encodeURIComponent(TOKEN)):'')}
    const headers=()=>({Authorization:'Bearer '+TOKEN,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'})
    const b64d=b=>decodeURIComponent(escape(atob((b||'').replace(/\s/g,''))))
    const esc=s=>(s||'').replace(/"/g,'&quot;')
    const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
    const ABREV=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ']

    async function ghGetBlobB64(sha){const r=await fetch(BLOBS+sha,{headers:headers()});if(!r.ok)throw 0;return ((await r.json()).content||'').replace(/\s/g,'')}

    async function carregar(){
      if(!TOKEN){abrir();return}
      document.getElementById('status').textContent='carregando…'
      try{
        const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH+'&t='+Date.now(),{headers:headers(),cache:'no-store'})
        if(res.status===401||res.status===403){abrir('Token sem acesso ao repositório.');return}
        if(!res.ok)throw 0
        const j=await res.json()
        EDICOES=JSON.parse(b64d(j.content))||[]
        if(!Array.isArray(EDICOES))EDICOES=[]
        render();atualizarNav();document.getElementById('status').textContent=''
      }catch{document.getElementById('status').textContent='erro ao carregar'}
    }

    function gruposHTML(lista){
      const grupos=[]; let curKey=null,cur=null
      for(const e of lista){
        const k=mesKey(e.data)
        if(k!==curKey){cur={label:mesLabel(e.data),cards:[]};grupos.push(cur);curKey=k}
        cur.cards.push(cardHTML(e))
      }
      return grupos.map(g=>`<div class="month">${g.label}</div><div class="grid">${g.cards.join('')}</div>`).join('')
    }
    function render(){
      const wrap=document.getElementById('wrap')
      if(!EDICOES.length){wrap.innerHTML='<div class="empty-all">Nenhuma edição planejada ainda.</div>';return}
      const hoje=new Date().toISOString().slice(0,10)
      const ordc=(a,b)=>(!a.data&&!b.data)?0:!a.data?1:!b.data?-1:a.data<b.data?-1:1
      const futuras=EDICOES.filter(e=>!e.data||e.data>=hoje).sort(ordc)
      const passadas=EDICOES.filter(e=>e.data&&e.data<hoje).sort(ordc)
      let html=''
      if(passadas.length)html+=`<details class="past-wrap"><summary>Edições anteriores (${passadas.length})</summary>${gruposHTML(passadas)}</details>`
      html+=`<div id="futuras">${gruposHTML(futuras)||'<div class="empty-all">Nenhuma edição próxima planejada.</div>'}</div>`
      wrap.innerHTML=html
      document.querySelectorAll('#futuras img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))
      const det=wrap.querySelector('.past-wrap')
      if(det)det.addEventListener('toggle',()=>{if(det.open)det.querySelectorAll('img[data-sha]').forEach(im=>carregarSha(im.dataset.sha))})
    }
    function mesKey(d){return d?d.slice(0,7):'zzz'}
    function mesLabel(d){if(!d)return 'Sem data';const[y,m]=d.split('-');return `${MESES[+m-1]} ${y}`}

    function cardHTML(e){
      const dia=e.data?e.data.slice(8,10):'—'
      const mes=e.data?ABREV[+e.data.slice(5,7)-1]:''
      const id=e.imgDia||{}, ad=e.artistaDia||{}
      const capa = id.thumb&&id.thumb.sha
        ? `<img data-sha="${id.thumb.sha}" alt="">`
        : `<div class="ph">sem imagem</div>`
      const dlDia = id.img&&id.img.sha ? `<button class="dl-btn" data-dl='${jattr(id.img)}'>↓ original</button>`:''
      const artista = id.artista
        ? `<div class="artista">${esc(id.artista)}${id.ano?` <span class="ano">· ${esc(id.ano)}</span>`:''}</div>`
        : `<div class="artista empty">Edição Aurora</div>`
      const linkDia = id.link?`<a class="pill" href="${esc(id.link)}" target="_blank" rel="noopener">Imagem do dia ↗</a>`:''
      const adThumb = ad.thumb&&ad.thumb.sha?`<img class="mini" data-sha="${ad.thumb.sha}" alt="">`:`<div class="mini"></div>`
      const adLink = ad.link?`<a class="pill" href="${esc(ad.link)}" target="_blank" rel="noopener">Abrir ↗</a>`:`<span class="pill ghost">sem link</span>`
      const adDl = ad.img&&ad.img.sha?`<button class="dl-btn" data-dl='${jattr(ad.img)}'>↓</button>`:''
      return `<div class="card">
        <div class="cover">${capa}
          <div class="chip"><div class="d">${dia}</div><div class="m">${mes}</div></div>
          ${dlDia?`<div class="dl">${dlDia}</div>`:''}
        </div>
        <div class="body">
          <div class="artrow">${artista}<a class="editbtn" href="planejamento.html#${TOKEN?('tk='+encodeURIComponent(TOKEN)+'&'):''}ed=${e.id}" title="Editar esta edição">✎ editar</a></div>
          <div class="links">${linkDia||'<span class="pill ghost">sem link</span>'}</div>
          <div class="artblock">
            ${adThumb}
            <div class="col">
              <div class="lbl">Artista do dia</div>
              ${ad.nome?`<div class="adnome">${esc(ad.nome)}</div>`:''}
              <div class="links">${adLink} ${adDl}</div>
            </div>
          </div>
        </div>
      </div>`
    }
    function jattr(meta){return esc(JSON.stringify({sha:meta.sha,name:meta.name,type:meta.type}))}

    async function carregarSha(sha){
      if(!sha)return
      if(blobCache[sha]){aplicar(sha);return}
      try{blobCache[sha]='data:image/jpeg;base64,'+await ghGetBlobB64(sha);aplicar(sha)}catch{}
    }
    function aplicar(sha){document.querySelectorAll(`img[data-sha="${sha}"]`).forEach(im=>im.src=blobCache[sha])}

    async function baixar(meta){
      try{
        const b64=await ghGetBlobB64(meta.sha);const bin=atob(b64);const arr=new Uint8Array(bin.length)
        for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i)
        const blob=new Blob([arr],{type:meta.type||'application/octet-stream'})
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=meta.name||'imagem';a.click();URL.revokeObjectURL(a.href)
      }catch{alert('Erro ao baixar.')}
    }
    document.getElementById('wrap').addEventListener('click',ev=>{
      const b=ev.target.closest('[data-dl]');if(b){try{baixar(JSON.parse(b.dataset.dl))}catch{}}
    })

    // token
    function abrir(erro){
      const ov=document.getElementById('overlay');ov.classList.remove('hidden')
      const e=document.getElementById('tokErr');if(erro){e.textContent=erro;e.style.display='block'}else e.style.display='none'
      if(!erro)armarGesto()
    }
    function armarGesto(){
      const h=()=>{
        document.removeEventListener('pointerdown',h);document.removeEventListener('keydown',h)
        setTimeout(()=>{
          if(document.getElementById('overlay').classList.contains('hidden'))return
          const v=document.getElementById('tokInput').value.trim()
          if(v)document.getElementById('tokSave').click()
        },60)
      }
      document.addEventListener('pointerdown',h);document.addEventListener('keydown',h)
    }
    document.getElementById('tokSave').onclick=async()=>{
      const v=document.getElementById('tokInput').value.trim();if(!v)return
      TOKEN=v
      try{
        const res=await fetch(CONTENTS+FILE+'?ref='+BRANCH,{headers:headers()})
        if(!res.ok)throw 0
        localStorage.setItem(TOKEN_KEY,TOKEN)
        document.getElementById('overlay').classList.add('hidden')
        carregar()
      }catch{TOKEN='';const e=document.getElementById('tokErr');e.textContent='Não consegui entrar. Confira o token.';e.style.display='block'}
    }
    document.getElementById('tokInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('tokSave').click()})
    document.getElementById('btnToken').onclick=()=>{if(confirm('Sair (remover token deste navegador)?')){localStorage.removeItem(TOKEN_KEY);TOKEN='';abrir()}}
    document.getElementById('btnLink').onclick=()=>{
      if(!TOKEN){alert('Entre primeiro (cole o token) e depois copie o link.');return}
      const url=location.origin+location.pathname+'#tk='+encodeURIComponent(TOKEN)
      const msg='✅ Link de acesso copiado!\n\nSalve nos FAVORITOS. Abrindo por ele, entra sozinho.\n\n⚠️ O link contém o token (funciona como senha). Não compartilhe publicamente.'
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>alert(msg)).catch(()=>prompt('Copie o link:',url))}
      else prompt('Copie o link de acesso:',url)
    }
    document.getElementById('btnReload').onclick=carregar

    atualizarNav()
    carregar()
  </script>
</body>
</html>
